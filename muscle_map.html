<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>Карта мышц</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d0d0d;
  --surface:#1a1a1a;
  --surface2:#222;
  --border:#2e2e2e;
  --text:#f0f0f0;
  --muted:#888;
  --accent:#b5f542;
  --accent2:#42f5c5;
  --syn:#4299e1;
  --ant:#f56565;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;overflow-x:hidden}
.app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;padding:12px 14px}

.tgl{display:flex;background:var(--surface);border-radius:12px;padding:3px;gap:3px;margin-bottom:14px;flex-shrink:0}
.tgl button{flex:1;padding:9px;border:none;background:transparent;border-radius:9px;font-size:13px;font-weight:600;letter-spacing:.3px;color:var(--muted);cursor:pointer;transition:all .2s}
.tgl button.on{background:var(--accent);color:#000}

.body-wrap{display:flex;gap:10px;align-items:flex-start;flex:1;min-height:0}

.svg-col{flex:0 0 148px;position:relative}
svg{width:100%;display:block}

.mz{cursor:pointer;transition:opacity .18s,filter .18s}
.mz:hover{filter:brightness(1.2)}

.panel{flex:1;display:flex;flex-direction:column;gap:0;overflow:hidden}
.panel-idle{display:flex;align-items:center;justify-content:center;height:100%;padding:20px}
.panel-idle p{font-size:13px;color:var(--muted);text-align:center;line-height:1.8}

.muscle-name{font-size:17px;font-weight:700;letter-spacing:-.3px;margin-bottom:8px;color:var(--text)}

.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.tag{padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:.2px}
.tag-main{background:rgba(181,245,66,.15);color:var(--accent);border:1px solid rgba(181,245,66,.25)}
.tag-syn{background:rgba(66,153,225,.15);color:var(--syn);border:1px solid rgba(66,153,225,.25)}
.tag-ant{background:rgba(245,101,101,.15);color:var(--ant);border:1px solid rgba(245,101,101,.25)}

.legend{font-size:10px;color:var(--muted);margin-bottom:8px;line-height:1.7}

.vlist{flex:1;overflow-y:auto}
.vlist::-webkit-scrollbar{display:none}
.vsec{font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin:6px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.vi{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);text-decoration:none;cursor:pointer}
.vi:last-child{border-bottom:none}
.vico{width:32px;height:32px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--accent);font-size:11px;font-weight:700;transition:background .15s}
.vi:hover .vico{background:rgba(181,245,66,.12)}
.vt{font-size:12px;color:var(--text);line-height:1.4;font-weight:500}

.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;flex-shrink:0;overflow-y:auto;max-height:72px}
.chips::-webkit-scrollbar{display:none}
.chip{padding:5px 11px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--border);cursor:pointer;color:var(--muted);background:var(--surface);white-space:nowrap;transition:all .15s}
.chip.active{background:var(--accent);color:#000;border-color:var(--accent)}
.chip:hover:not(.active){border-color:#555;color:var(--text)}
</style>
</head>
<body>
<div class="app">
  <div class="tgl">
    <button id="bf" class="on" onclick="sv('front')">Спереди</button>
    <button id="bb" onclick="sv('back')">Сзади</button>
  </div>

  <div class="body-wrap">
    <div class="svg-col">
      <svg viewBox="0 0 180 410" xmlns="http://www.w3.org/2000/svg">

        <!-- === SILHOUETTE BASE === -->
        <g id="sil" fill="#1e1e1e" stroke="#333" stroke-width="0.8">
          <!-- head -->
          <circle cx="90" cy="26" r="19"/>
          <!-- neck -->
          <rect x="84" y="43" width="12" height="16" rx="3"/>
          <!-- torso -->
          <polygon points="48,60 132,60 118,188 62,188"/>
          <!-- left upper arm -->
          <ellipse cx="36" cy="115" rx="12" ry="33"/>
          <!-- right upper arm -->
          <ellipse cx="144" cy="115" rx="12" ry="33"/>
          <!-- left forearm -->
          <ellipse cx="32" cy="175" rx="9" ry="25"/>
          <!-- right forearm -->
          <ellipse cx="148" cy="175" rx="9" ry="25"/>
          <!-- hip -->
          <ellipse cx="90" cy="207" rx="33" ry="13"/>
          <!-- left thigh -->
          <ellipse cx="71" cy="273" rx="21" ry="42"/>
          <!-- right thigh -->
          <ellipse cx="109" cy="273" rx="21" ry="42"/>
          <!-- left shin -->
          <ellipse cx="68" cy="357" rx="13" ry="27"/>
          <!-- right shin -->
          <ellipse cx="112" cy="357" rx="13" ry="27"/>
          <!-- left foot -->
          <ellipse cx="68" cy="390" rx="14" ry="6"/>
          <!-- right foot -->
          <ellipse cx="112" cy="390" rx="14" ry="6"/>
        </g>

        <!-- ===== FRONT ZONES ===== -->
        <g id="fz">
          <!-- CHEST — single unified shape -->
          <path class="mz" data-g="chest"
            d="M 56,72 Q 90,62 124,72 L 122,112 Q 90,122 58,112 Z"
            fill="#b5f542" opacity="0.45" onclick="sm('chest')"/>

          <!-- SHOULDERS front (2 zones, 1 group) -->
          <ellipse class="mz" data-g="shoulders" cx="43" cy="72" rx="14" ry="12"
            fill="#42f5c5" opacity="0.45" onclick="sm('shoulders')"/>
          <ellipse class="mz" data-g="shoulders" cx="137" cy="72" rx="14" ry="12"
            fill="#42f5c5" opacity="0.45" onclick="sm('shoulders')"/>

          <!-- BICEPS -->
          <ellipse class="mz" data-g="biceps" cx="34" cy="117" rx="10" ry="22"
            fill="#fac775" opacity="0.45" onclick="sm('biceps')"/>
          <ellipse class="mz" data-g="biceps" cx="146" cy="117" rx="10" ry="22"
            fill="#fac775" opacity="0.45" onclick="sm('biceps')"/>

          <!-- FOREARMS front -->
          <ellipse class="mz" data-g="forearms" cx="30" cy="175" rx="8" ry="21"
            fill="#97c459" opacity="0.45" onclick="sm('forearms')"/>
          <ellipse class="mz" data-g="forearms" cx="150" cy="175" rx="8" ry="21"
            fill="#97c459" opacity="0.45" onclick="sm('forearms')"/>

          <!-- CORE -->
          <path class="mz" data-g="core"
            d="M 78,115 L 102,115 L 100,178 Q 90,183 80,178 Z"
            fill="#ed93b1" opacity="0.45" onclick="sm('core')"/>

          <!-- QUADS — two shapes, one group -->
          <path class="mz" data-g="quads"
            d="M 51,233 Q 72,226 88,230 L 87,313 Q 71,320 53,312 Z"
            fill="#7f77dd" opacity="0.45" onclick="sm('quads')"/>
          <path class="mz" data-g="quads"
            d="M 92,230 Q 108,226 129,233 L 127,312 Q 109,320 93,313 Z"
            fill="#7f77dd" opacity="0.45" onclick="sm('quads')"/>

          <!-- ADDUCTORS (inner thighs) -->
          <path class="mz" data-g="adductors"
            d="M 88,233 Q 90,228 92,233 L 95,305 Q 90,310 85,305 Z"
            fill="#f0997b" opacity="0.45" onclick="sm('adductors')"/>

          <!-- CALVES front — single wide group -->
          <path class="mz" data-g="calves"
            d="M 55,332 Q 70,324 84,328 L 83,380 Q 70,385 56,378 Z"
            fill="#5dcaa5" opacity="0.45" onclick="sm('calves')"/>
          <path class="mz" data-g="calves"
            d="M 96,328 Q 110,324 125,332 L 124,378 Q 110,385 97,380 Z"
            fill="#5dcaa5" opacity="0.45" onclick="sm('calves')"/>
        </g>

        <!-- ===== BACK ZONES ===== -->
        <g id="bz" style="display:none">
          <!-- TRAPS — upper trapezius -->
          <path class="mz" data-g="traps"
            d="M 75,59 L 105,59 Q 112,60 120,73 Q 90,88 60,73 Q 68,60 75,59 Z"
            fill="#f4c0d1" opacity="0.45" onclick="sm('traps')"/>

          <!-- LATS — side wings (2 shapes, 1 group) -->
          <path class="mz" data-g="lats"
            d="M 50,87 L 66,92 L 64,162 L 49,155 Z"
            fill="#85b7eb" opacity="0.45" onclick="sm('lats')"/>
          <path class="mz" data-g="lats"
            d="M 130,87 L 114,92 L 116,162 L 131,155 Z"
            fill="#85b7eb" opacity="0.45" onclick="sm('lats')"/>

          <!-- UPPER BACK (rhomboids + mid traps) -->
          <path class="mz" data-g="upperback"
            d="M 66,92 L 114,92 L 112,162 L 68,162 Z"
            fill="#afa9ec" opacity="0.45" onclick="sm('upperback')"/>

          <!-- SHOULDERS back -->
          <ellipse class="mz" data-g="shoulders" cx="43" cy="72" rx="14" ry="12"
            fill="#42f5c5" opacity="0.45" onclick="sm('shoulders')"/>
          <ellipse class="mz" data-g="shoulders" cx="137" cy="72" rx="14" ry="12"
            fill="#42f5c5" opacity="0.45" onclick="sm('shoulders')"/>

          <!-- TRICEPS -->
          <ellipse class="mz" data-g="triceps" cx="34" cy="117" rx="10" ry="22"
            fill="#f4c0d1" opacity="0.45" onclick="sm('triceps')"/>
          <ellipse class="mz" data-g="triceps" cx="146" cy="117" rx="10" ry="22"
            fill="#f4c0d1" opacity="0.45" onclick="sm('triceps')"/>

          <!-- FOREARMS back -->
          <ellipse class="mz" data-g="forearms" cx="30" cy="175" rx="8" ry="21"
            fill="#97c459" opacity="0.45" onclick="sm('forearms')"/>
          <ellipse class="mz" data-g="forearms" cx="150" cy="175" rx="8" ry="21"
            fill="#97c459" opacity="0.45" onclick="sm('forearms')"/>

          <!-- GLUTES — single unified shape -->
          <path class="mz" data-g="glutes"
            d="M 50,193 Q 72,184 90,187 Q 108,184 130,193 L 128,232 Q 108,238 90,236 Q 72,238 52,232 Z"
            fill="#f0997b" opacity="0.45" onclick="sm('glutes')"/>

          <!-- HAMSTRINGS — single unified group -->
          <path class="mz" data-g="hamstrings"
            d="M 51,235 Q 72,229 88,233 L 87,314 Q 71,322 52,314 Z"
            fill="#c0dd97" opacity="0.45" onclick="sm('hamstrings')"/>
          <path class="mz" data-g="hamstrings"
            d="M 92,233 Q 108,229 129,235 L 128,314 Q 109,322 93,314 Z"
            fill="#c0dd97" opacity="0.45" onclick="sm('hamstrings')"/>

          <!-- CALVES back — combined group -->
          <path class="mz" data-g="calves"
            d="M 55,332 Q 70,324 84,328 L 83,380 Q 70,385 56,378 Z"
            fill="#5dcaa5" opacity="0.45" onclick="sm('calves')"/>
          <path class="mz" data-g="calves"
            d="M 96,328 Q 110,324 125,332 L 124,378 Q 110,385 97,380 Z"
            fill="#5dcaa5" opacity="0.45" onclick="sm('calves')"/>
        </g>

      </svg>
    </div>

    <!-- INFO PANEL -->
    <div class="panel">
      <div id="ip">
        <div class="panel-idle">
          <p>Нажми на мышцу<br>на схеме или<br>выбери из списка</p>
        </div>
      </div>
    </div>
  </div>

  <!-- CHIP LIST -->
  <div class="chips" id="ch"></div>
</div>

<script>
const M = {
  chest:     { name:'Грудные',          syn:['shoulders','triceps'],      ant:['upperback','lats'], v:['front'],
    vids:[
      {t:'Жим штанги лёжа',              u:'https://t.me/c/YOUR_CHANNEL/1'},
      {t:'Жим гантелей на наклонной',    u:'https://t.me/c/YOUR_CHANNEL/2'},
      {t:'Разводка гантелей',            u:'https://t.me/c/YOUR_CHANNEL/3'},
      {t:'Сведение в кроссовере',        u:'https://t.me/c/YOUR_CHANNEL/4'},
    ]},
  upperback: { name:'Верх спины',       syn:['lats','biceps'],            ant:['chest'], v:['back'],
    vids:[
      {t:'Тяга штанги в наклоне',        u:'https://t.me/c/YOUR_CHANNEL/5'},
      {t:'Тяга гантели одной рукой',     u:'https://t.me/c/YOUR_CHANNEL/6'},
      {t:'Тяга горизонтального блока',   u:'https://t.me/c/YOUR_CHANNEL/7'},
    ]},
  lats:      { name:'Широчайшие',       syn:['biceps','upperback'],       ant:['chest','shoulders'], v:['back'],
    vids:[
      {t:'Подтягивания широким хватом',  u:'https://t.me/c/YOUR_CHANNEL/8'},
      {t:'Тяга верхнего блока',          u:'https://t.me/c/YOUR_CHANNEL/9'},
      {t:'Пуловер с гантелью',           u:'https://t.me/c/YOUR_CHANNEL/10'},
    ]},
  traps:     { name:'Трапеции',         syn:['shoulders','upperback'],    ant:[], v:['back'],
    vids:[
      {t:'Шраги со штангой',             u:'https://t.me/c/YOUR_CHANNEL/11'},
      {t:'Шраги с гантелями',            u:'https://t.me/c/YOUR_CHANNEL/12'},
      {t:'Тяга к подбородку',            u:'https://t.me/c/YOUR_CHANNEL/13'},
    ]},
  shoulders: { name:'Плечи',            syn:['chest','triceps'],          ant:['lats'], v:['front','back'],
    vids:[
      {t:'Жим гантелей сидя',            u:'https://t.me/c/YOUR_CHANNEL/14'},
      {t:'Разводка в стороны',           u:'https://t.me/c/YOUR_CHANNEL/15'},
      {t:'Жим штанги стоя',              u:'https://t.me/c/YOUR_CHANNEL/16'},
      {t:'Разводка в наклоне',           u:'https://t.me/c/YOUR_CHANNEL/17'},
    ]},
  biceps:    { name:'Бицепс',           syn:['forearms','lats'],          ant:['triceps'], v:['front'],
    vids:[
      {t:'Сгибание со штангой стоя',     u:'https://t.me/c/YOUR_CHANNEL/18'},
      {t:'Молотковые сгибания',          u:'https://t.me/c/YOUR_CHANNEL/19'},
      {t:'Концентрированное сгибание',   u:'https://t.me/c/YOUR_CHANNEL/20'},
    ]},
  triceps:   { name:'Трицепс',          syn:['shoulders','chest'],        ant:['biceps'], v:['back'],
    vids:[
      {t:'Жим узким хватом',             u:'https://t.me/c/YOUR_CHANNEL/21'},
      {t:'Французский жим',              u:'https://t.me/c/YOUR_CHANNEL/22'},
      {t:'Разгибание на блоке',          u:'https://t.me/c/YOUR_CHANNEL/23'},
    ]},
  forearms:  { name:'Предплечья',       syn:['biceps'],                   ant:[], v:['front','back'],
    vids:[
      {t:'Сгибание кисти со штангой',    u:'https://t.me/c/YOUR_CHANNEL/24'},
      {t:'Обратное сгибание запястья',   u:'https://t.me/c/YOUR_CHANNEL/25'},
    ]},
  core:      { name:'Кор / пресс',      syn:['lats'],                     ant:[], v:['front'],
    vids:[
      {t:'Скручивания',                  u:'https://t.me/c/YOUR_CHANNEL/26'},
      {t:'Планка',                       u:'https://t.me/c/YOUR_CHANNEL/27'},
      {t:'Подъём ног в висе',            u:'https://t.me/c/YOUR_CHANNEL/28'},
      {t:'Ролик для пресса',             u:'https://t.me/c/YOUR_CHANNEL/29'},
    ]},
  quads:     { name:'Квадрицепс',       syn:['glutes','calves'],          ant:['hamstrings'], v:['front'],
    vids:[
      {t:'Приседание со штангой',        u:'https://t.me/c/YOUR_CHANNEL/30'},
      {t:'Жим ногами',                   u:'https://t.me/c/YOUR_CHANNEL/31'},
      {t:'Разгибание ног в тренажёре',   u:'https://t.me/c/YOUR_CHANNEL/32'},
      {t:'Выпады',                       u:'https://t.me/c/YOUR_CHANNEL/33'},
    ]},
  hamstrings:{ name:'Бицепс бедра',     syn:['glutes'],                   ant:['quads'], v:['back'],
    vids:[
      {t:'Становая тяга на прямых ногах',u:'https://t.me/c/YOUR_CHANNEL/34'},
      {t:'Сгибание ног в тренажёре',     u:'https://t.me/c/YOUR_CHANNEL/35'},
      {t:'Мёртвая тяга с гантелями',     u:'https://t.me/c/YOUR_CHANNEL/36'},
    ]},
  glutes:    { name:'Ягодичные',        syn:['hamstrings','quads'],       ant:[], v:['back'],
    vids:[
      {t:'Ягодичный мостик',             u:'https://t.me/c/YOUR_CHANNEL/37'},
      {t:'Становая тяга сумо',           u:'https://t.me/c/YOUR_CHANNEL/38'},
      {t:'Отведение ноги в блоке',       u:'https://t.me/c/YOUR_CHANNEL/39'},
    ]},
  calves:    { name:'Икроножные',       syn:['quads'],                    ant:[], v:['front','back'],
    vids:[
      {t:'Подъём на носки стоя',         u:'https://t.me/c/YOUR_CHANNEL/40'},
      {t:'Подъём на носки сидя',         u:'https://t.me/c/YOUR_CHANNEL/41'},
    ]},
  adductors: { name:'Приводящие',       syn:['quads','glutes'],           ant:[], v:['front'],
    vids:[
      {t:'Сведение ног в тренажёре',     u:'https://t.me/c/YOUR_CHANNEL/42'},
      {t:'Приседание сумо',              u:'https://t.me/c/YOUR_CHANNEL/43'},
    ]},
};

const FRONT_CHIPS = ['chest','shoulders','biceps','triceps','forearms','core','quads','adductors','calves'];
const BACK_CHIPS  = ['traps','upperback','lats','shoulders','triceps','forearms','glutes','hamstrings','calves'];

let cv = 'front', sel = null;

function sv(v) {
  cv = v;
  document.getElementById('bf').className = v==='front' ? 'on' : '';
  document.getElementById('bb').className = v==='back'  ? 'on' : '';
  document.getElementById('fz').style.display = v==='front' ? '' : 'none';
  document.getElementById('bz').style.display = v==='back'  ? '' : 'none';
  if (sel && !M[sel].v.includes(v)) { sel = null; renderPanel(); }
  rc(); upd();
}

function sm(k) {
  sel = k;
  if (!M[k].v.includes(cv)) { cv = M[k].v[0]; sv(cv); }
  rc(); upd(); renderPanel();
}

function upd() {
  document.querySelectorAll('.mz').forEach(e => {
    const g = e.dataset.g;
    if (!sel) { e.style.opacity = '0.45'; return; }
    if (g === sel)                     { e.style.opacity = '1';    e.style.filter = 'brightness(1.1)'; }
    else if (M[sel] && M[sel].syn.includes(g)) { e.style.opacity = '0.7'; e.style.filter = ''; }
    else if (M[sel] && M[sel].ant.includes(g)) { e.style.opacity = '0.4'; e.style.filter = ''; }
    else                               { e.style.opacity = '0.1'; e.style.filter = ''; }
  });
}

function rc() {
  const chips = cv === 'front' ? FRONT_CHIPS : BACK_CHIPS;
  document.getElementById('ch').innerHTML = chips.map(k =>
    `<span class="chip${sel===k?' active':''}" onclick="sm('${k}')">${M[k].name}</span>`
  ).join('');
}

function renderPanel() {
  if (!sel) {
    document.getElementById('ip').innerHTML = `<div class="panel-idle"><p>Нажми на мышцу<br>на схеме или<br>выбери из списка</p></div>`;
    return;
  }
  const m = M[sel];
  const synLabels = m.syn.map(k => `<span class="tag tag-syn">${M[k]?.name||k}</span>`).join('');
  const antLabels = m.ant.map(k => `<span class="tag tag-ant">${M[k]?.name||k}</span>`).join('');
  const legend = [
    m.syn.length ? '🟦 синергисты' : '',
    m.ant.length ? '🟥 антагонисты' : '',
  ].filter(Boolean).join('  ');

  document.getElementById('ip').innerHTML = `
    <p class="muscle-name">${m.name}</p>
    <div class="tags">
      <span class="tag tag-main">основная</span>
      ${synLabels}${antLabels}
    </div>
    ${legend ? `<p class="legend">${legend}</p>` : ''}
    <div class="vlist">
      <p class="vsec">Упражнения</p>
      ${m.vids.map((v,i) => `
        <a class="vi" href="${v.u}" target="_blank">
          <div class="vico">${i+1}</div>
          <span class="vt">${v.t}</span>
        </a>`).join('')}
    </div>`;
}

if (window.Telegram && window.Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

sv('front');
</script>
</body>
</html>
